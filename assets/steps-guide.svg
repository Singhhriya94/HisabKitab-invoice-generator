<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" rx="36" fill="#0F172A"/>
  <rect x="34" y="34" width="1132" height="652" rx="30" fill="url(#bg)"/>
  <text x="72" y="106" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700">How To Use Hisab Kitab</text>
  <text x="72" y="146" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="20">Three simple steps from account creation to invoice download</text>

  <rect x="72" y="196" width="320" height="430" rx="28" fill="#111827" stroke="#A855F7" stroke-opacity="0.28"/>
  <rect x="440" y="196" width="320" height="430" rx="28" fill="#111827" stroke="#A855F7" stroke-opacity="0.28"/>
  <rect x="808" y="196" width="320" height="430" rx="28" fill="#111827" stroke="#A855F7" stroke-opacity="0.28"/>

  <circle cx="132" cy="256" r="28" fill="#7C3AED"/>
  <text x="122" y="265" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">1</text>
  <text x="178" y="250" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Sign Up</text>
  <text x="178" y="287" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">Create an account with</text>
  <text x="178" y="314" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">name, phone, email</text>
  <text x="178" y="341" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">and password.</text>
  <rect x="110" y="388" width="240" height="170" rx="22" fill="#1E293B"/>
  <rect x="130" y="416" width="200" height="20" rx="10" fill="#334155"/>
  <rect x="130" y="454" width="160" height="20" rx="10" fill="#334155"/>
  <rect x="130" y="492" width="184" height="20" rx="10" fill="#334155"/>
  <rect x="130" y="530" width="126" height="18" rx="9" fill="#7C3AED"/>

  <circle cx="500" cy="256" r="28" fill="#7C3AED"/>
  <text x="490" y="265" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">2</text>
  <text x="546" y="250" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Fill Invoice</text>
  <text x="546" y="287" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">Add company, client,</text>
  <text x="546" y="314" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">item, quantity, price</text>
  <text x="546" y="341" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">and optional tax.</text>
  <rect x="478" y="388" width="240" height="170" rx="22" fill="#1E293B"/>
  <rect x="498" y="416" width="100" height="20" rx="10" fill="#334155"/>
  <rect x="608" y="416" width="90" height="20" rx="10" fill="#334155"/>
  <rect x="498" y="454" width="200" height="20" rx="10" fill="#334155"/>
  <rect x="498" y="492" width="160" height="20" rx="10" fill="#334155"/>
  <rect x="498" y="530" width="170" height="18" rx="9" fill="#06B6D4"/>

  <circle cx="868" cy="256" r="28" fill="#7C3AED"/>
  <text x="858" y="265" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">3</text>
  <text x="914" y="250" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Preview</text>
  <text x="914" y="287" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">See totals update live,</text>
  <text x="914" y="314" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">save invoice history,</text>
  <text x="914" y="341" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">and download as PDF.</text>
  <rect x="846" y="388" width="240" height="170" rx="22" fill="#F8FAFC"/>
  <rect x="870" y="418" width="100" height="14" rx="7" fill="#CBD5E1"/>
  <rect x="870" y="448" width="170" height="12" rx="6" fill="#E2E8F0"/>
  <rect x="870" y="474" width="170" height="12" rx="6" fill="#E2E8F0"/>
  <rect x="870" y="500" width="120" height="12" rx="6" fill="#E2E8F0"/>
  <rect x="870" y="526" width="150" height="18" rx="9" fill="#7C3AED"/>

  <defs>
    <linearGradient id="bg" x1="66" y1="54" x2="1118" y2="662" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
  </defs>
